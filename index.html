header {

.thumb canvas { width: 100%; height: 100%; display: block; }
.thumb-label {

bottom: 0; left: 0; right: 0;
background: rgba(2,4,8,0.85);
font-family: ‘Share Tech Mono’, monospace;

.code-section {

.code-header {

.copy-btn {

pre {

border: 1px solid var(–border);

color: #8ba8c8;

}
pre .kw  { color: #00d4ff; }
pre .fn  { color: #ff9f40; }
pre .str { color: #a8ff78; }
pre .cm  { color: #3a5068; font-style: italic; }

footer {
max-width: 780px;
margin: 40px auto 60px;
padding-top: 20px;
border-top: 1px solid var(–border);

<header>
  <div class="logo">SACRED<span>·</span>FRACTALS</div>

</header>

<div class="stage">

  <div class="code-header">
    <span id="codeTitle">// PIECE 01 — ORBITAL RINGS · JAVASCRIPT SOURCE</span>
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">COPY CODE</button>
  </div>
  <pre id="codeBlock"></pre>
</div>

<footer>SACRED FRACTAL GENERATOR · ALL MATH RENDERED IN REAL-TIME · NO SERVER REQUIRED</footer>

<script>

// ═══════════════════════════════════════════════════════
// CORE MATH
// ═══════════════════════════════════════════════════════

function norm(arr) {
  let mn = Infinity, mx = -Infinity;
  for (let v of arr) { if (v < mn) mn = v; if (v > mx) mx = v; }
  const rng = mx - mn || 1;
  return arr.map(v => (v - mn) / rng);
}

function multiBand(arr, freqs) {
  const out = new Float32Array(arr.length);
  let totalW = 0;
  freqs.forEach((f, i) => {
    const w = Math.pow(0.5, i);
    totalW += w;
    for (let j = 0; j < arr.length; j++)
      out[j] += (Math.sin(arr[j] * Math.PI * f) * 0.5 + 0.5) * w;
  });
  for (let j = 0; j < out.length; j++) out[j] /= totalW;
  return norm(Array.from(out));
}

// ═══════════════════════════════════════════════════════
// PALETTES
// ═══════════════════════════════════════════════════════

const PALETTES = {
  electric_blue: t => [
    Math.pow(Math.sin(t*Math.PI*4+3.5),2)*0.5,
    Math.pow(Math.sin(t*Math.PI*5+2.5),2)*0.4,
    Math.pow(Math.abs(Math.sin(t*Math.PI*3+0.5)),0.6)
  ],
  lava: t => [
    Math.pow(t, 0.4),
    Math.pow(Math.sin(t*Math.PI*3), 2)*0.6,
    Math.pow(Math.sin(t*Math.PI*7+Math.PI), 2)*0.3
  ],
  aurora: t => [
    Math.pow(Math.sin(t*Math.PI*2+4.0), 2)*0.6,
    Math.pow(Math.abs(Math.sin(t*Math.PI*3+1.0)), 0.7),
    Math.pow(Math.abs(Math.sin(t*Math.PI*2.5+2.5)), 0.5)
  ],
  toxic: t => [
    Math.pow(Math.sin(t*Math.PI*4+2.0), 2)*0.4,
    Math.pow(t, 0.35),
    Math.pow(Math.sin(t*Math.PI*6+1.0), 2)*0.35
  ],
  cosmic: t => {
    const h = (t*3.0)%1.0, i = Math.floor(h*6)%6, f = h*6-Math.floor(h*6), q = 1-f;
    const tb = [[1,f,0],[q,1,0],[0,1,f],[0,q,1],[f,0,1],[1,0,q]];
    const [r,g,b] = tb[i];
    const lum = Math.pow(0.299*r+0.587*g+0.114*b+1e-8, 0.5);
    return [r*lum, g*lum, b*lum];
  },
  violet_gold: t => [
    Math.min(1, Math.pow(Math.sin(t*Math.PI*3+0.5),2)*0.9 + t*0.2),
    Math.pow(Math.sin(t*Math.PI*4+2.0), 2)*0.5,
    Math.pow(Math.abs(Math.sin(t*Math.PI*2+1.0)), 0.5)
  ],
  blood_neon: t => [
    Math.pow(t, 0.45),
    Math.pow(Math.sin(t*Math.PI*5+2.0), 2)*0.25,
    Math.pow(Math.sin(t*Math.PI*4+4.0), 2)*0.5
  ],
  ice_mint: t => [
    Math.pow(Math.sin(t*Math.PI*3+4.0), 2)*0.35,
    Math.pow(Math.abs(Math.sin(t*Math.PI*2+0.5)), 0.55),
    Math.pow(Math.abs(Math.sin(t*Math.PI*2.5+1.0)), 0.5)
  ],
  solar: t => [
    Math.pow(Math.abs(Math.sin(t*Math.PI*1.5)), 0.5),
    Math.pow(Math.sin(t*Math.PI*2+0.5), 2)*0.75,
    Math.pow(Math.sin(t*Math.PI*4+3.0), 2)*0.2
  ],
  deep_violet: t => [
    Math.pow(Math.sin(t*Math.PI*4+1.5), 2)*0.75,
    Math.pow(Math.sin(t*Math.PI*5+3.0), 2)*0.2,
    Math.pow(Math.abs(Math.sin(t*Math.PI*2.5+0.8)), 0.55)
  ]
};

// ═══════════════════════════════════════════════════════
// 20 FRACTAL PIECES
// ═══════════════════════════════════════════════════════

const PIECES = [

  // 01 — original 10 pieces unchanged
  {
    name: "ORBITAL RINGS",
    palette: "electric_blue",
    freqs: [4,8,16],
    field: (x,y,t) => {
      const r = Math.sqrt(x*x+y*y), th = Math.atan2(y,x);
      let z = Math.sin(r*18 + t*0.8)*0.4;
      z += Math.sin(r*9 + th*6 + t*0.5)*0.4;
      z += Math.cos(r*6 - th*9 - t*0.3)*0.3;
      const petal = Math.cos(th*7)*Math.exp(-Math.pow(r-1.2,2)*3);
      z += petal*0.5;
      const wx = x + Math.sin(z*Math.PI + y*2)*0.25;
      const wy = y + Math.cos(z*Math.PI + x*2)*0.25;
      const rw = Math.sqrt(wx*wx+wy*wy), tw = Math.atan2(wy,wx);
      z += Math.sin(rw*12 + tw*6 + t*0.6)*0.3;
      return z;
    }
  },

  {
    name: "SPIRAL GALAXY",
    palette: "cosmic",
    freqs: [3,6,12,24],
    field: (x,y,t) => {
      const r = Math.sqrt(x*x+y*y)+0.001, th = Math.atan2(y,x);
      const spiral = Math.sin(3*th + 6*Math.log(r+0.3)*3 + t*0.4)*Math.exp(-r*0.4);
      let z = spiral*0.6;
      z += Math.sin(r*14 + 3*th + t*0.7)*0.25*Math.exp(-r*0.3);
      z += Math.cos(r*7 - 3*th*2 - t*0.5)*0.25;
      z += Math.exp(-r*3)*0.4;
      const wx = x + Math.sin(z*Math.PI + y*2)*0.35, wy = y + Math.cos(z*Math.PI + x*2)*0.35;
      const rw = Math.sqrt(wx*wx+wy*wy)+0.001, tw = Math.atan2(wy,wx);
      z += Math.sin(3*tw + 5*Math.log(rw+0.3)*3 + t*0.4)*0.25*Math.exp(-rw*0.3);
      return z;
    }
  },

  {
    name: "MANDALA BLOOM",
    palette: "aurora",
    freqs: [4,8,16,32],
    field: (x,y,t) => {
      const r = Math.sqrt(x*x+y*y), th = Math.atan2(y,x);
      const rose = Math.cos(8*th + t*0.15);
      let z = Math.sin((r - Math.abs(rose)*0.8)*20 + t*0.6)*Math.exp(-r*0.5)*0.5;
      z += Math.cos(8*th + r*10 + t*0.4)*Math.exp(-r*0.35)*0.4;
      z += Math.sin(16*th + r*5 - t*0.3)*0.25;
      z += Math.sin(r*22 + t*0.9)*0.2*Math.exp(-r*0.4);
      return z;
    }
  },

  {
    name: "INTERFERENCE WEB",
    palette: "lava",
    freqs: [3,6,12],
    sources: [[-0.8,0],[0.8,0],[0,-0.8],[0,0.8],[-0.5,-0.7],[0.5,0.7],[-0.5,0.7],[0.5,-0.7]],
    field: function(x,y,t) {
      let z = 0;
      for (const [sx,sy] of this.sources) {
        const d = Math.sqrt((x-sx)**2+(y-sy)**2);
        z += Math.sin(d*22 + t*0.7)*Math.exp(-d*0.6);
      }
      const wx = x + Math.sin(z*0.4*Math.PI + y*2)*0.3;
      const wy = y + Math.cos(z*0.4*Math.PI + x*2)*0.3;
      const r = Math.sqrt(wx*wx+wy*wy), th = Math.atan2(wy,wx);
      z += Math.sin(r*12 + th*5 + t*0.5)*0.25;
      return z;
    }
  },

  {
    name: "VORTEX FIELD",
    palette: "violet_gold",
    freqs: [4,8,16],
    vortices: [[-0.6,0.4,1],[0.7,-0.3,-1],[0.0,0.8,1],[-0.4,-0.7,-1]],
    field: function(x,y,t) {
      let z = 0;
      for (const [vx,vy,spin] of this.vortices) {
        const dx=x-vx, dy=y-vy;
        const vr = Math.sqrt(dx*dx+dy*dy)+0.01;
        const va = Math.atan2(dy,dx);
        z += Math.sin(vr*14 + spin*va*4 + t*0.6)*Math.exp(-vr*1.2)*0.4;
      }
      const r=Math.sqrt(x*x+y*y), th=Math.atan2(y,x);
      z += Math.sin(th*5 + r*8 + t*0.4)*0.3*Math.exp(-r*0.3);
      const wx=x+Math.sin(z*Math.PI+y*2)*0.5, wy=y+Math.cos(z*Math.PI+x*2)*0.5;
      const rw=Math.sqrt(wx*wx+wy*wy), tw=Math.atan2(wy,wx);
      z += Math.sin(rw*10 + tw*7 + t*0.5)*0.25;
      return z;
    }
  },

  {
    name: "QUASICRYSTAL",
    palette: "toxic",
    freqs: [4,8,16],
    field: (x,y,t) => {
      let z = 0;
      for (let k=0;k<5;k++) {
        const a = k*Math.PI*2/5;
        z += Math.cos(x*Math.cos(a)*9 + y*Math.sin(a)*9 + t*0.3);
      }
      z /= 5;
      const r=Math.sqrt(x*x+y*y);
      z += Math.sin(r*15 + t*0.8)*0.3*Math.exp(-r*0.3);
      const wx=x+Math.sin(z*Math.PI+y*2)*0.4, wy=y+Math.cos(z*Math.PI+x*2)*0.4;
      let zw=0;
      for (let k=0;k<5;k++) {
        const a=k*Math.PI*2/5;
        zw+=Math.cos(wx*Math.cos(a)*6 + wy*Math.sin(a)*6 + t*0.25);
      }
      return z*0.5 + (zw/5)*0.5;
    }
  },

  {
    name: "CELTIC KNOT",
    palette: "aurora",
    freqs: [4,8,16,32],
    field: (x,y,t) => {
      let z = Math.sin(x*8 + Math.sin(y*8+t*0.5)*1.5)*0.4;
      z += Math.sin(y*8 + Math.sin(x*8+t*0.4)*1.5)*0.4;
      z += Math.cos((x+y)*7 + t*0.3)*Math.cos((x-y)*7)*0.3;
      const r=Math.sqrt(x*x+y*y);
      z *= (Math.exp(-r*0.5)*0.5+0.5);
      z += Math.sin(r*16 + Math.atan2(y,x)*8 + t*0.6)*0.2;
      const wx=x+Math.sin(z*Math.PI+y*2)*0.35, wy=y+Math.cos(z*Math.PI+x*2)*0.35;
      z += Math.sin(wx*8 + Math.sin(wy*8)*1.5)*0.2;
      return z;
    }
  },

  {
    name: "NEBULA CORE",
    palette: "cosmic",
    freqs: [3,6,12],
    field: (x,y,t) => {
      let z=0, amp=1, freq=1;
      for (let o=0;o<6;o++) {
        z += Math.sin(x*freq*3.7 + y*freq*2.9 + t*0.2*freq)*amp;
        z += Math.cos(x*freq*2.9 - y*freq*3.7 - t*0.15*freq)*amp;
        amp*=0.52; freq*=2.07;
      }
      const wx=x+Math.sin(((z+8)/16)*Math.PI + y*2)*0.5;
      const wy=y+Math.cos(((z+8)/16)*Math.PI + x*2)*0.5;
      let zw=0; amp=1; freq=1;
      for (let o=0;o<4;o++) {
        zw+=Math.sin(wx*freq*3.7 + wy*freq*2.9 + t*0.18*freq)*amp;
        amp*=0.5; freq*=2.1;
      }
      const r=Math.sqrt(x*x+y*y), th=Math.atan2(y,x);
      return z*0.5 + zw*0.5 + Math.sin(r*12+th*5+t*0.4)*0.2;
    }
  },

  {
    name: "PRISM CATHEDRAL",
    palette: "violet_gold",
    freqs: [4,8,16,32],
    field: (x,y,t) => {
      const r=Math.sqrt(x*x+y*y), th=Math.atan2(y,x);
      let z = Math.sin(12*th + t*0.15)*0.4;
      z += Math.sin(r*20 + t*0.8)*0.4;
      z += Math.cos(12*th + r*10 + t*0.4)*0.25;
      z += Math.sin(24*th + t*0.1)*Math.sin(r*8)*0.2;
      z += Math.sin(x*15 + t*0.5)*Math.sin(y*15)*0.15;
      const wx=x+Math.sin(z*0.5*Math.PI+y*2)*0.25, wy=y+Math.cos(z*0.5*Math.PI+x*2)*0.25;
      const rw=Math.sqrt(wx*wx+wy*wy), tw=Math.atan2(wy,wx);
      z += Math.sin(12*tw + rw*12 + t*0.5)*0.2;
      return z;
    }
  },

  {
    name: "JULIA BLOOMS",
    palette: "electric_blue",
    freqs: [2,4,8],
    field: (x,y,t) => {
      const cx = -0.7+Math.sin(t*0.08)*0.05, cy = 0.27+Math.cos(t*0.06)*0.04;
      let zr=x*0.8, zi=y*0.8, smooth=0;
      for (let i=0;i<40;i++) {
        const zr2 = zr*zr-zi*zi+cx, zi2 = 2*zr*zi+cy;
        const mag = zr2*zr2+zi2*zi2;
        if (mag>10) { smooth=i+1-Math.log2(Math.log2(Math.max(mag,1.01+1e-9))); break; }
        zr=zr2; zi=zi2;
      }
      return smooth;
    }
  },

  // 11 — 20 new pieces
  {
    name: "SATURN HALOS",
    palette: "ice_mint",
    freqs: [5,10,20],
    field: (x,y,t) => {
      const r=Math.sqrt(x*x+y*y), th=Math.atan2(y,x);
      let z = Math.sin(r*25 + t*0.9)*0.5;
      z += Math.sin(r*12.5 - th*3 + t*0.4)*0.35;
      z += Math.cos(r*6.25 + th*6 + t*0.3)*0.25;
      z += Math.exp(-Math.abs(r-1.0)*8)*0.4;
      z += Math.exp(-Math.abs(r-1.6)*8)*0.3;
      z += Math.exp(-Math.abs(r-0.5)*10)*0.2;
      const wx=x+Math.sin(th*2+t*0.2)*0.2, wy=y+Math.cos(th*2+t*0.2)*0.2;
      const rw=Math.sqrt(wx*wx+wy*wy);
      z += Math.sin(rw*20 + t*0.7)*0.2;
      return z;
    }
  },

  {
    name: "TYPHOON EYE",
    palette: "deep_violet",
    freqs: [4,8,16],
    field: (x,y,t) => {
      const r=Math.sqrt(x*x+y*y)+0.001, th=Math.atan2(y,x);
      const swirl = th + r*3.0;
      let z = Math.sin(swirl*4 + t*0.5)*Math.exp(-r*0.4)*0.5;
      z += Math.cos(swirl*8 - t*0.4)*Math.exp(-r*0.6)*0.4;
      z += Math.sin(r*20 + t*0.9)*0.25*Math.exp(-r*0.3);
      z += Math.exp(-r*5)*Math.cos(swirl*12 + t*1.2)*0.4;
      const wx=x+Math.sin(z*Math.PI)*0.4, wy=y+Math.cos(z*Math.PI)*0.4;
      const rw=Math.sqrt(wx*wx+wy*wy), tw=Math.atan2(wy,wx);
      z += Math.sin(tw*6 + rw*12 + t*0.6)*0.25;
      return z;
    }
  },

  {
    name: "OCEAN CAUSTICS",
    palette: "ice_mint",
    freqs: [4,8,16],
    field: (x,y,t) => {
      let z = Math.sin(x*8 + t*0.7)*0.3 + Math.sin(y*10 - t*0.6)*0.3;
      z += Math.sin((x*0.7+y*0.7)*10 + t*0.5)*0.25;
      z += Math.sin((x*0.7-y*0.7)*8 - t*0.4)*0.25;
      const wx=x+z*0.5+Math.sin(t*0.3)*0.1, wy=y+z*0.45+Math.cos(t*0.25)*0.1;
      z = Math.sin(wx*10 + t*0.6)*0.3;
      z += Math.cos(wy*8 - t*0.5)*0.3;
      z += Math.sin(Math.sqrt(wx*wx+wy*wy)*16 + t*0.7)*0.25;
      z += Math.sin(wx*6 - wy*8 + t*0.4)*0.2;
      return z;
    }
  },

  {
    name: "ROSE MANDALA",
    palette: "blood_neon",
    freqs: [4,8,16],
    field: (x,y,t) => {
      const r=Math.sqrt(x*x+y*y), th=Math.atan2(y,x);
      const rose = Math.cos(5*th + t*0.1);
      let z = Math.sin((r - Math.abs(rose)*0.9)*22 + t*0.7)*Math.exp(-r*0.45)*0.55;
      z += Math.cos(5*th + r*12 - t*0.5)*Math.exp(-r*0.3)*0.4;
      z += Math.sin(10*th + r*6 + t*0.3)*0.3;
      z += Math.sin(r*18 + t*0.8)*0.2*Math.exp(-r*0.4);
      const wx=x+Math.sin(z*Math.PI)*0.3, wy=y+Math.cos(z*Math.PI)*0.3;
      z += Math.sin(Math.sqrt(wx*wx+wy*wy)*14 + Math.atan2(wy,wx)*5 + t*0.5)*0.2;
      return z;
    }
  },

  {
    name: "CRYSTAL LATTICE",
    palette: "solar",
    freqs: [4,8,16],
    field: (x,y,t) => {
      let z = Math.sin(x*12 + t*0.3)*0.3 + Math.sin(y*12 - t*0.25)*0.3;
      z += Math.cos((x+y)*10 + t*0.2)*0.25 + Math.cos((x-y)*10 - t*0.2)*0.25;
      z += Math.sin(x*8 + y*6 + t*0.35)*0.2;
      const r=Math.sqrt(x*x+y*y);
      z *= (Math.exp(-r*0.3)+0.2);
      const wx=x+Math.sin(z*Math.PI)*0.4, wy=y+Math.cos(z*Math.PI)*0.4;
      z += Math.sin(wx*12 + t*0.28)*0.2 + Math.cos(wy*12 - t*0.22)*0.2;
      z += Math.sin((wx+wy)*8 + t*0.18)*0.15;
      return z;
    }
  },

  {
    name: "JULIA DRAGON",
    palette: "blood_neon",
    freqs: [2,4,8],
    field: (x,y,t) => {
      const cx=-0.8+Math.sin(t*0.07)*0.06, cy=0.156+Math.cos(t*0.05)*0.04;
      let zr=x*0.9, zi=y*0.9, smooth=0;
      for (let i=0;i<50;i++) {
        const zr2=zr*zr-zi*zi+cx, zi2=2*zr*zi+cy;
        const mag=zr2*zr2+zi2*zi2;
        if (mag>10) { smooth=i+1-Math.log2(Math.log2(Math.max(mag,1.01+1e-9))); break; }
        zr=zr2; zi=zi2;
      }
      return smooth;
    }
  },

  {
    name: "7-FOLD CRYSTAL",
    palette: "toxic",
    freqs: [4,8,16],
    field: (x,y,t) => {
      let z=0;
      for (let k=0;k<7;k++) {
        const a=k*Math.PI*2/7+t*0.03;
        z+=Math.cos(x*Math.cos(a)*8 + y*Math.sin(a)*8);
      }
      z/=7;
      const r=Math.sqrt(x*x+y*y);
      z += Math.sin(r*18 + t*0.7)*0.2*Math.exp(-r*0.3);
      const wx=x+Math.sin(z*Math.PI)*0.35, wy=y+Math.cos(z*Math.PI)*0.35;
      let zw=0;
      for (let k=0;k<7;k++) {
        const a=k*Math.PI*2/7;
        zw+=Math.cos(wx*Math.cos(a)*5 + wy*Math.sin(a)*5);
      }
      return z*0.5 + (zw/7)*0.5;
    }
  },

  {
    name: "GALACTIC ARMS",
    palette: "cosmic",
    freqs: [3,6,12],
    field: (x,y,t) => {
      const r=Math.sqrt(x*x+y*y)+0.001, th=Math.atan2(y,x);
      let z = Math.sin(3*th + 5*Math.log(r+0.3)*3 + t*0.4)*Math.exp(-r*0.2)*0.5;
      z += Math.cos(3*th - 5*Math.log(r+0.3)*3 - t*0.35)*Math.exp(-r*0.2)*0.35;
      z += Math.sin(r*12 + th*3 + t*0.5)*0.3;
      z += Math.sin(r*22 + t*0.8)*0.2*Math.exp(-r*0.4);
      const wx=x+Math.sin(z*Math.PI+y*2)*0.4, wy=y+Math.cos(z*Math.PI+x*2)*0.4;
      const rw=Math.sqrt(wx*wx+wy*wy)+0.001, tw=Math.atan2(wy,wx);
      z += Math.sin(3*tw + 4*Math.log(rw+0.3)*3 + t*0.38)*0.25*Math.exp(-rw*0.25);
      return z;
    }
  },

  {
    name: "PULSAR RINGS",
    palette: "electric_blue",
    freqs: [4,8,16,32],
    field: (x,y,t) => {
      const r=Math.sqrt(x*x+y*y), th=Math.atan2(y,x);
      const pulse=Math.sin(r*30 - t*2.0)*Math.exp(-r*0.4);
      let z=pulse*0.5;
      z += Math.sin(th*4 + r*10 + t*0.5)*0.3*Math.exp(-r*0.3);
      z += Math.cos(r*15 + t*1.2)*0.25;
      z += Math.sin(th*8 - r*5 - t*0.6)*0.2*Math.exp(-r*0.5);
      const wx=x+Math.sin(z*Math.PI+y*2)*0.3, wy=y+Math.cos(z*Math.PI+x*2)*0.3;
      const rw=Math.sqrt(wx*wx+wy*wy);
      z += Math.sin(rw*25 - t*1.8)*0.2*Math.exp(-rw*0.4);
      return z;
    }
  },

  {
    name: "HYPNOTIC COIL",
    palette: "aurora",
    freqs: [4,8,16],
    field: (x,y,t) => {
      const r=Math.sqrt(x*x+y*y)+0.001, th=Math.atan2(y,x);
      const spiral = th/(2*Math.PI) + r;
      let z = Math.sin(spiral*28 + t*0.7)*0.5;
      z += Math.cos(spiral*14 - t*0.5)*0.4;
      z += Math.sin(r*24 + t*0.9)*0.25;
      const wx=x+Math.sin(th*4+t*0.3)*0.35, wy=y+Math.cos(th*4+t*0.3)*0.35;
      const rw=Math.sqrt(wx*wx+wy*wy)+0.001;
      const spiralw = Math.atan2(wy,wx)/(2*Math.PI) + rw;
      z += Math.sin(spiralw*20 + t*0.65)*0.25;
      return z;
    }
  }

];

// ═══════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════

const RES = 380;
const EXTENT = 2.2;

function renderFrame(ctx, piece, t, res) {
  const W = res, H = res;
  const imgData = ctx.createImageData(W, H);
  const data = imgData.data;
  const vals = new Float32Array(W*H);

  for (let py=0; py<H; py++) {
    for (let px=0; px<W; px++) {
      const x = (px/(W-1))*2*EXTENT - EXTENT;
      const y = (py/(H-1))*2*EXTENT - EXTENT;
      vals[py*W+px] = piece.field(x,y,t);
    }
  }

  const normed = multiBand(Array.from(vals), piece.freqs);
  const palFn = PALETTES[piece.palette];

  for (let i=0; i<W*H; i++) {
    const [r,g,b] = palFn(normed[i]);
    data[i*4]   = Math.min(255, r*255);
    data[i*4+1] = Math.min(255, g*255);
    data[i*4+2] = Math.min(255, b*255);
    data[i*4+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

// ═══════════════════════════════════════════════════════
// THUMBNAIL SYSTEM
// ═══════════════════════════════════════════════════════

const THUMB_RES = 80;
const thumbCanvases = [];

function renderThumb(idx) {
  const c = thumbCanvases[idx];
  const ctx = c.getContext('2d');
  renderFrame(ctx, PIECES[idx], 0, THUMB_RES);
}

function buildGallery() {
  const gallery = document.getElementById('gallery');
  PIECES.forEach((p, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb' + (i===0 ? ' active' : '');
    wrap.onclick = () => selectPiece(i);

    const c = document.createElement('canvas');
    c.width = THUMB_RES; c.height = THUMB_RES;
    thumbCanvases.push(c);
    wrap.appendChild(c);

    const lbl = document.createElement('div');
    lbl.className = 'thumb-label';
    lbl.textContent = p.name;
    wrap.appendChild(lbl);

    gallery.appendChild(wrap);
    setTimeout(() => renderThumb(i), i * 80);
  });
}

// ═══════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════

const mainCanvas = document.getElementById('main');
const mainCtx = mainCanvas.getContext('2d');

let currentIdx = 0;
let t = 0;
let playing = true;
let speedMult = 0.20;
let lastTimestamp = null;

function selectPiece(idx) {
  currentIdx = idx;
  document.getElementById('stageName').textContent = PIECES[idx].name;
  document.getElementById('stageNum').textContent = String(idx+1).padStart(2,'0') + ' / ' + PIECES.length;
  document.getElementById('codeTitle').textContent = '// PIECE ' + String(idx+1).padStart(2,'0') + ' — ' + PIECES[idx].name + ' · JAVASCRIPT SOURCE';
  document.querySelectorAll('.thumb').forEach((el,i) => el.classList.toggle('active', i===idx));
  showCode(idx);
  if (!playing) renderFrame(mainCtx, PIECES[currentIdx], t, RES);
}

function animate(ts) {
  if (!lastTimestamp) lastTimestamp = ts;
  const dt = (ts - lastTimestamp) / 1000;
  lastTimestamp = ts;
  if (playing) {
    t += dt * speedMult;
    renderFrame(mainCtx, PIECES[currentIdx], t, RES);
  }
  requestAnimationFrame(animate);
}

// ═══════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════

document.getElementById('btnPlay').onclick = function() {
  playing = !playing;
  this.textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
  this.classList.toggle('active', playing);
  if (playing) lastTimestamp = null;
};

document.getElementById('btnPrev').onclick = () => {
  selectPiece((currentIdx - 1 + PIECES.length) % PIECES.length);
};

document.getElementById('btnNext').onclick = () => {
  selectPiece((currentIdx + 1) % PIECES.length);
};

document.getElementById('speedSlider').oninput = function() {
  speedMult = this.value / 100;
  document.getElementById('speedVal').textContent = this.value + '%';
};

// ═══════════════════════════════════════════════════════
// CODE DISPLAY + COPY
// ═══════════════════════════════════════════════════════

function syntaxHL(code) {
  return code
    .replace(/\/\/.*/g, m => '<span class="cm">' + m + '</span>')
    .replace(/\b(const|let|var|function|return|for|of|Math|new|this|if|else)\b/g, m => '<span class="kw">' + m + '</span>')
    .replace(/\b(Math\.\w+)\b/g, m => '<span class="fn">' + m + '</span>')
    .replace(/-?\d+\.?\d*/g, m => '<span class="num">' + m + '</span>')
    .replace(/"[^"]*"/g, m => '<span class="str">' + m + '</span>');
}

function showCode(idx) {
  const p = PIECES[idx];
  const code =
    '// PIECE ' + String(idx+1).padStart(2,'0') + ' — ' + p.name + '\n' +
    '// Palette: ' + p.palette + '\n' +
    '// Band frequencies: [' + p.freqs.join(', ') + ']\n\n' +
    'const piece = {\n' +
    '  name: "' + p.name + '",\n' +
    '  palette: "' + p.palette + '",\n' +
    '  freqs: [' + p.freqs.join(', ') + '],\n' +
    '  field: ' + p.field.toString() + '\n' +
    '};\n\n' +
    '// ─── PALETTE ──────────────────────────────────────\n' +
    'const palette_' + p.palette + ' = ' + PALETTES[p.palette].toString() + ';\n\n' +
    '// ─── MULTI-BAND COLORIZER ─────────────────────────\n' +
    'function multiBand(arr, freqs) {\n' +
    '  const out = new Float32Array(arr.length);\n' +
    '  let totalW = 0;\n' +
    '  freqs.forEach((f, i) => {\n' +
    '    const w = Math.pow(0.5, i);\n' +
    '    totalW += w;\n' +
    '    for (let j = 0; j < arr.length; j++)\n' +
    '      out[j] += (Math.sin(arr[j] * Math.PI * f) * 0.5 + 0.5) * w;\n' +
    '  });\n' +
    '  for (let j = 0; j < out.length; j++) out[j] /= totalW;\n' +
    '  return norm(Array.from(out));\n' +
    '}\n\n' +
    '// ─── RENDER FRAME (use in requestAnimationFrame) ──\n' +
    'function renderFrame(ctx, t) {\n' +
    '  const W = 780, H = 780, EXTENT = 2.2;\n' +
    '  const imgData = ctx.createImageData(W, H);\n' +
    '  const vals = new Float32Array(W * H);\n' +
    '  for (let py = 0; py < H; py++) {\n' +
    '    for (let px = 0; px < W; px++) {\n' +
    '      const x = (px/(W-1))*2*EXTENT - EXTENT;\n' +
    '      const y = (py/(H-1))*2*EXTENT - EXTENT;\n' +
    '      vals[py*W+px] = piece.field(x, y, t);\n' +
    '    }\n' +
    '  }\n' +
    '  const colored = multiBand(Array.from(vals), piece.freqs);\n' +
    '  for (let i = 0; i < W*H; i++) {\n' +
    '    const [r,g,b] = palette_' + p.palette + '(colored[i]);\n' +
    '    imgData.data[i*4]   = r * 255;\n' +
    '    imgData.data[i*4+1] = g * 255;\n' +
    '    imgData.data[i*4+2] = b * 255;\n' +
    '    imgData.data[i*4+3] = 255;\n' +
    '  }\n' +
    '  ctx.putImageData(imgData, 0, 0);\n' +
    '}';

  document.getElementById('codeBlock').innerHTML = syntaxHL(code);
}

function copyCode() {
  const text = document.getElementById('codeBlock').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ COPIED';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY CODE'; btn.classList.remove('copied'); }, 2000);
  });
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildGallery();
showCode(0);
document.getElementById('stageName').textContent = PIECES[0].name;
document.getElementById('stageNum').textContent = '01 / ' + PIECES.length;
requestAnimationFrame(animate);

</script>
